<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=/bifrost/" />
    <link rel="canonical" href="https://bifrost-proxy.github.io/bifrost/" />
    <title>Bifrost Docs</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: light-dark(#101816, #edf5f1);
        background: light-dark(#f7f8f4, #0d1211);
      }

      main {
        width: min(460px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 10px;
        font-size: 42px;
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: light-dark(#5d6965, #9eb0aa);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        padding: 0 16px;
        border-radius: 8px;
        color: light-dark(#ffffff, #07110e);
        background: light-dark(#111816, #dff7f1);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("/bifrost/");
    </script>
  </head>
  <body>
    <main>
      <h1>Bifrost</h1>
      <p>Redirecting to the Bifrost documentation site.</p>
      <a href="/bifrost/">Open Bifrost Docs</a>
    </main>
  </body>
</html>
